<style>
body { padding-top: 1.25rem; }
.les-container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 1rem 4rem; }
.les-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.les-title { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.les-subtitle { color: var(--muted); font-size: 0.85rem; }

/* ── Instruction tabs ─────────────────────────────────────────────────────── */
.inst-tabs { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
.inst-tab {
  padding: .3rem .9rem; border-radius: 6px; border: 1.5px solid var(--card-border);
  background: var(--card); color: var(--subtle); font-size: .8rem; font-weight: 700;
  cursor: pointer; font-family: 'Courier New', monospace;
  transition: border-color .2s, color .2s, background .2s;
}
.inst-tab:hover { border-color: var(--accent); color: var(--accent); }
.inst-tab.active { border-color: var(--accent); color: var(--accent); background: var(--bg2); box-shadow: 0 0 10px var(--glow); }

/* ── Section header card ──────────────────────────────────────────────────── */
.sect-head {
  background: var(--card); border: 1px solid var(--card-border); border-radius: 12px;
  padding: 1rem 1.25rem; margin-bottom: 1rem;
  display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start;
}
.sect-mnemonic {
  font-size: 2rem; font-weight: 900; font-family: 'Courier New', monospace;
  color: var(--accent); line-height: 1.1; min-width: 100px; white-space: nowrap;
}
.sect-info { flex: 1; min-width: 200px; }
.sect-name { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: .3rem; }
.sect-desc { font-size: .85rem; color: var(--subtle); line-height: 1.6; margin-bottom: .5rem; }
.sect-syntax {
  font-family: 'Courier New', monospace; font-size: .86rem;
  background: var(--bg2); border: 1px solid var(--card-border);
  border-radius: 6px; padding: .3rem .75rem; display: inline-block;
  color: var(--text); margin-bottom: .35rem;
}
.sect-flags { font-size: .75rem; font-style: italic; }

/* ── Three-panel grid ─────────────────────────────────────────────────────── */
.sim-panels { display: grid; grid-template-columns: 1fr 210px 210px; gap: .75rem; margin-bottom: .75rem; }
@media (max-width: 820px) { .sim-panels { grid-template-columns: 1fr; } }

.sim-panel {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
  min-height: 260px; max-height: 360px;
}
.sim-panel-hdr {
  padding: .45rem .9rem; background: var(--bg2); border-bottom: 1px solid var(--card-border);
  font-size: .65rem; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--accent); flex-shrink: 0;
}
.sim-panel-body { flex: 1; overflow-y: auto; }
.sim-panel-body::-webkit-scrollbar { width: 4px; }
.sim-panel-body::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }

/* ── Code panel ───────────────────────────────────────────────────────────── */
.code-line {
  display: flex; align-items: center; padding: .22rem .6rem; gap: .45rem;
  font-family: 'Courier New', monospace; font-size: .78rem; white-space: pre;
  border-bottom: 1px solid rgba(255,255,255,.025); transition: background .2s;
}
.code-line.active { background: rgba(129,140,248,.18); border-left: 3px solid var(--accent); }
.code-ln { width: 18px; color: var(--muted); text-align: right; flex-shrink: 0; font-size: .68rem; }
.code-arrow { width: 12px; flex-shrink: 0; color: var(--accent); font-size: .8rem; }
.code-text { flex: 1; }
.cm { color: var(--muted); font-style: italic; }

/* ── Register panel ───────────────────────────────────────────────────────── */
.reg-row {
  display: flex; align-items: center; padding: .28rem .7rem; gap: .4rem;
  font-size: .76rem; border-bottom: 1px solid rgba(255,255,255,.04);
}
.reg-name {
  font-family: 'Courier New', monospace; font-weight: 700;
  width: 36px; color: var(--muted); flex-shrink: 0; font-size: .7rem;
}
.reg-val { font-family: 'Courier New', monospace; color: var(--text); font-size: .72rem; flex: 1; }
.reg-row.changed .reg-val { color: var(--accent); animation: reg-flash 1.4s ease-out forwards; }
@keyframes reg-flash {
  0%   { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
  100% { color: var(--text);   text-shadow: none; }
}

/* ── Memory panel ─────────────────────────────────────────────────────────── */
.mem-cell {
  padding: .4rem .75rem; border-bottom: 1px solid rgba(255,255,255,.04);
  transition: background .3s; border-left: 3px solid transparent;
}
.mem-addr { font-family: 'Courier New', monospace; font-size: .64rem; color: var(--muted); }
.mem-val  { font-family: 'Courier New', monospace; font-size: .76rem; color: var(--text); font-weight: 700; margin: .1rem 0; }
.mem-lbl  { font-size: .64rem; color: var(--subtle); }
.mem-cell.written { background: rgba(251,191,36,.07); border-left-color: var(--warning); }
.mem-cell.written .mem-val { color: var(--warning); animation: mem-flash 1.4s ease-out forwards; }
@keyframes mem-flash {
  0%   { color: var(--warning); text-shadow: 0 0 10px var(--warning); }
  100% { color: var(--text);    text-shadow: none; }
}
.mem-cell.read { background: rgba(56,189,248,.07); border-left-color: var(--accent2); }
.mem-cell.read .mem-val { color: var(--accent2); }
.mem-none { padding: .6rem .9rem; font-size: .76rem; color: var(--muted); font-style: italic; }

/* ── Flags panel ──────────────────────────────────────────────────────────── */
.flags-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; padding: .65rem; }
.flag-box {
  background: var(--bg2); border: 1.5px solid var(--card-border);
  border-radius: 7px; padding: .45rem .5rem; text-align: center;
  transition: border-color .3s, background .3s;
}
.flag-box.set { border-color: var(--accent); background: rgba(129,140,248,.1); box-shadow: 0 0 8px var(--glow); }
.flag-name { font-family: 'Courier New', monospace; font-size: .72rem; font-weight: 700; color: var(--muted); }
.flag-val  { font-size: 1.2rem; font-weight: 900; color: var(--text); line-height: 1.1; }
.flag-box.set .flag-name { color: var(--accent); }
.flag-box.set .flag-val  { color: var(--accent); }
.flag-meaning { font-size: .6rem; color: var(--muted); margin-top: .1rem; }

/* ── Narrative ────────────────────────────────────────────────────────────── */
.sim-narrative {
  background: var(--card); border: 1px solid var(--card-border);
  border-left: 3px solid var(--accent); border-radius: 10px;
  padding: .85rem 1.1rem; margin-bottom: .75rem;
  font-size: .88rem; color: var(--subtle); line-height: 1.65; min-height: 58px;
}
.sim-narrative strong { color: var(--accent); }
.sim-narrative code {
  font-family: 'Courier New', monospace; color: var(--text);
  background: var(--bg2); padding: 0 .3rem; border-radius: 3px;
}

/* ── Controls ─────────────────────────────────────────────────────────────── */
.sim-controls { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
.btn-prev, .btn-next {
  padding: .45rem 1.05rem; border-radius: 7px; font-size: .86rem; font-weight: 700;
  cursor: pointer; border: 1.5px solid; font-family: inherit; transition: opacity .15s;
}
.btn-prev { background: var(--bg2); color: var(--subtle); border-color: var(--card-border); }
.btn-prev:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn-next { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-next:hover:not(:disabled) { opacity: .88; }
.btn-prev:disabled, .btn-next:disabled { opacity: .3; cursor: not-allowed; }
.step-counter { font-size: .78rem; color: var(--muted); }
.step-pips { display: flex; gap: 5px; align-items: center; margin-left: auto; }
.step-pip {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--card-border); transition: background .3s; cursor: pointer;
}
.step-pip.done   { background: var(--success); }
.step-pip.active { background: var(--accent); box-shadow: 0 0 6px var(--glow); }

.back-link { display: inline-block; margin-top: .5rem; color: var(--accent); font-size: .85rem; text-decoration: none; }
.back-link:hover { text-decoration: underline; }
</style>
</head>

<script>
const REGS = ['rax','rbx','rcx','rdx','rsi','rdi','rsp','rbp'];
const B = { rax:'0x0000000000000000', rbx:'0x0000000000000000', rcx:'0x0000000000000000',
            rdx:'0x0000000000000000', rsi:'0x0000000000000000', rdi:'0x0000000000000000',
            rsp:'0x00007fffffffe020', rbp:'0x00007fffffffe020' };
const BF = { ZF:0, CF:0, SF:0, OF:0 };
function r(o){ return Object.assign({}, B, o); }
function f(o){ return Object.assign({}, BF, o); }

const SECTIONS = [

// ── MOV ──────────────────────────────────────────────────────────────────────
{ id:'mov', name:'MOV', mnemonic:'MOV', fullname:'Move',
  syntax:'mov &lt;dst&gt;, &lt;src&gt;',
  desc:'Copies a value into the destination register or memory location. The source is never modified. Either operand can be a register, a memory address in [brackets], or an immediate constant. MOV is the single most common instruction in any binary.',
  flags_note:'Never modifies flags.',
  panel3:'mem',
  code:[
    {t:'; --- register &lt;- immediate ---',c:'cm'},
    {t:'mov rax, 42',c:''},
    {t:'; --- register &lt;- register ---',c:'cm'},
    {t:'mov rbx, rax',c:''},
    {t:'; --- memory  &lt;- register  ---',c:'cm'},
    {t:'mov [rsp-8], rbx',c:''},
    {t:'; --- register &lt;- memory   ---',c:'cm'},
    {t:'mov rcx, [rsp-8]',c:''},
  ],
  steps:[
    { active:-1, regs:r({}), changed:[],
      mem:[{addr:'0x7fffffffe018', val:'??????????????????', lbl:'(uninitialised)', cls:''}],
      flags:f({}),
      narrative:'<strong>Start.</strong> RAX, RBX, RCX are zero. RSP = 0x7fffffffe020. We will walk through every addressing mode: immediate, register-to-register, register-to-memory, and memory-to-register.' },
    { active:1, regs:r({rax:'0x000000000000002A'}), changed:['rax'],
      mem:[{addr:'0x7fffffffe018', val:'??????????????????', lbl:'(uninitialised)', cls:''}],
      flags:f({}),
      narrative:'<strong>mov rax, 42</strong> &mdash; the value 42 (= 0x2A) is embedded in the instruction bytes itself. The CPU decodes it and writes it straight into RAX. No memory bus cycle occurs. Flags are unchanged.' },
    { active:3, regs:r({rax:'0x000000000000002A', rbx:'0x000000000000002A'}), changed:['rbx'],
      mem:[{addr:'0x7fffffffe018', val:'??????????????????', lbl:'(uninitialised)', cls:''}],
      flags:f({}),
      narrative:'<strong>mov rbx, rax</strong> &mdash; the <em>contents</em> of RAX are copied into RBX. RAX is untouched. Both registers now hold 0x2A. Register-to-register MOV is effectively zero latency on modern out-of-order CPUs (handled by renaming).' },
    { active:5, regs:r({rax:'0x000000000000002A', rbx:'0x000000000000002A'}), changed:[],
      mem:[{addr:'0x7fffffffe018', val:'0x000000000000002A', lbl:'&larr; RBX written here', cls:'written'}],
      flags:f({}),
      narrative:'<strong>mov [rsp-8], rbx</strong> &mdash; square brackets mean <em>dereference</em>. The CPU computes RSP&minus;8 = 0x7fffffffe018 and writes 8 bytes of RBX to that address. RSP itself is unchanged &mdash; this is a direct store, not a push.' },
    { active:7, regs:r({rax:'0x000000000000002A', rbx:'0x000000000000002A', rcx:'0x000000000000002A'}), changed:['rcx'],
      mem:[{addr:'0x7fffffffe018', val:'0x000000000000002A', lbl:'&larr; read into RCX', cls:'read'}],
      flags:f({}),
      narrative:'<strong>mov rcx, [rsp-8]</strong> &mdash; dereferences address RSP&minus;8, reads 8 bytes, and places them in RCX. RCX = 0x2A. Notice the symmetry: <code>mov [addr], reg</code> stores to memory; <code>mov reg, [addr]</code> loads from memory.' },
  ]
},

// ── LEA ──────────────────────────────────────────────────────────────────────
{ id:'lea', name:'LEA', mnemonic:'LEA', fullname:'Load Effective Address',
  syntax:'lea &lt;dst&gt;, [&lt;addr-expr&gt;]',
  desc:'Computes the address inside the brackets and stores that address in the destination &mdash; without ever reading memory. The full x86 addressing mode (base + index&times;scale + displacement) acts as a free arithmetic unit. Compilers use it for fast multiply-by-small-constant and RIP-relative data references.',
  flags_note:'Never modifies flags.',
  panel3:'mem',
  code:[
    {t:'mov rbx, 0x100     ; base pointer',c:''},
    {t:'mov rcx, 4         ; index',c:''},
    {t:'; compute addr: no memory read',c:'cm'},
    {t:'lea rax, [rbx + rcx*2]',c:''},
    {t:'; contrast: MOV would dereference!',c:'cm'},
    {t:'; mov rax, [rbx+rcx*2]  <- reads mem',c:'cm'},
    {t:'; RIP-relative (PIE / ASLR)',c:'cm'},
    {t:'lea rdi, [rip + 0x200]',c:''},
  ],
  steps:[
    { active:-1, regs:r({}), changed:[],
      mem:[{addr:'0x0000000000000100', val:'0xDEADBEEFCAFEBABE', lbl:'some data', cls:''}],
      flags:f({}),
      narrative:'<strong>Start.</strong> There is data sitting at address 0x100. We will show how LEA computes an address <em>without touching memory</em>, then contrast it with what MOV would do.' },
    { active:0, regs:r({rbx:'0x0000000000000100'}), changed:['rbx'],
      mem:[{addr:'0x0000000000000100', val:'0xDEADBEEFCAFEBABE', lbl:'data at 0x100', cls:''}],
      flags:f({}),
      narrative:'<strong>mov rbx, 0x100</strong> &mdash; RBX = 0x100. This is our base pointer. We will use it as the base of an address calculation.' },
    { active:1, regs:r({rbx:'0x0000000000000100', rcx:'0x0000000000000004'}), changed:['rcx'],
      mem:[{addr:'0x0000000000000100', val:'0xDEADBEEFCAFEBABE', lbl:'data at 0x100', cls:''}],
      flags:f({}),
      narrative:'<strong>mov rcx, 4</strong> &mdash; RCX = 4. This is our index. The addressing mode will compute RBX + RCX&times;2 = 0x100 + 8 = 0x108.' },
    { active:3, regs:r({rbx:'0x0000000000000100', rcx:'0x0000000000000004', rax:'0x0000000000000108'}), changed:['rax'],
      mem:[{addr:'0x0000000000000100', val:'0xDEADBEEFCAFEBABE', lbl:'NOT accessed', cls:''}],
      flags:f({}),
      narrative:'<strong>lea rax, [rbx + rcx*2]</strong> &mdash; the CPU evaluates RBX + RCX&times;2 = 0x100 + 8 = <strong>0x108</strong> and writes that result into RAX. <em>No memory is read.</em> The brackets look like a dereference but are just syntax for the address expression. Compare: <code>mov rax, [rbx+rcx*2]</code> would read 8 bytes <em>from</em> address 0x108.' },
    { active:7, regs:r({rbx:'0x0000000000000100', rcx:'0x0000000000000004', rax:'0x0000000000000108', rdi:'0x0000000000401208'}), changed:['rdi'],
      mem:[{addr:'0x0000000000000100', val:'0xDEADBEEFCAFEBABE', lbl:'NOT accessed', cls:''}],
      flags:f({}),
      narrative:'<strong>lea rdi, [rip + 0x200]</strong> &mdash; in Position Independent Executables (PIE), the compiler accesses globals via RIP-relative addressing. RIP holds the address of the <em>next</em> instruction; LEA adds the displacement to get a pointer to data in .data/.rodata. No hardcoded absolute addresses &mdash; the binary works anywhere in memory.' },
  ]
},

// ── PUSH / POP ────────────────────────────────────────────────────────────────
{ id:'push', name:'PUSH/POP', mnemonic:'PUSH / POP', fullname:'Stack Push & Pop',
  syntax:'push &lt;src&gt; &nbsp;/&nbsp; pop &lt;dst&gt;',
  desc:'PUSH atomically decrements RSP by 8 then writes to [RSP]. POP reads from [RSP] then increments RSP by 8. The x86 stack grows toward lower addresses &mdash; so push moves RSP down, pop moves it up. These are the primitives underlying every function call.',
  flags_note:'Neither modifies flags.',
  panel3:'mem',
  code:[
    {t:'; rax=0xAAAA, rbx=0xBBBB, rsp=0x7ffe020',c:'cm'},
    {t:'push rax    ; rsp-=8, [rsp]=rax',c:''},
    {t:'push rbx    ; rsp-=8, [rsp]=rbx',c:''},
    {t:'pop  rcx    ; rcx=[rsp], rsp+=8',c:''},
  ],
  steps:[
    { active:-1,
      regs:r({rax:'0x000000000000AAAA', rbx:'0x000000000000BBBB', rsp:'0x00007fffffffe020', rbp:'0x00007fffffffe020'}), changed:[],
      mem:[
        {addr:'0x7fffffffe018', val:'??????????????????', lbl:'(free)', cls:''},
        {addr:'0x7fffffffe010', val:'??????????????????', lbl:'(free)', cls:''},
      ],
      flags:f({}),
      narrative:'<strong>Start.</strong> RAX = 0xAAAA, RBX = 0xBBBB. RSP = 0x7ffe020 &mdash; the current stack top. Two slots below are uninitialised. The stack grows <em>downward</em>: lower addresses are "higher" on the stack.' },
    { active:1,
      regs:r({rax:'0x000000000000AAAA', rbx:'0x000000000000BBBB', rsp:'0x00007fffffffe018', rbp:'0x00007fffffffe020'}), changed:['rsp'],
      mem:[
        {addr:'0x7fffffffe018', val:'0x000000000000AAAA', lbl:'&larr; RSP  (push rax)', cls:'written'},
        {addr:'0x7fffffffe010', val:'??????????????????', lbl:'(free)', cls:''},
      ],
      flags:f({}),
      narrative:'<strong>push rax</strong> &mdash; two steps, one instruction: 1) RSP &minus;= 8 (0x7ffe020 &rarr; 0x7ffe018), 2) [RSP] &larr; RAX. RAX itself is unchanged. RSP now points to the topmost <em>occupied</em> slot. The stack has grown by one 8-byte slot.' },
    { active:2,
      regs:r({rax:'0x000000000000AAAA', rbx:'0x000000000000BBBB', rsp:'0x00007fffffffe010', rbp:'0x00007fffffffe020'}), changed:['rsp'],
      mem:[
        {addr:'0x7fffffffe018', val:'0x000000000000AAAA', lbl:'(pushed rax)', cls:''},
        {addr:'0x7fffffffe010', val:'0x000000000000BBBB', lbl:'&larr; RSP  (push rbx)', cls:'written'},
      ],
      flags:f({}),

// ─── STATE ───────────────────────────────────────────────────────────────────
let curSect = 0, curStep = 0;

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderTabs(){
  const el = document.getElementById('inst-tabs');
  el.innerHTML = '';
  SECTIONS.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'inst-tab' + (i === curSect ? ' active' : '');
    b.textContent = s.name;
    b.onclick = () => { curSect = i; curStep = 0; render(); };
    el.appendChild(b);
  });
}

function renderSection(){
  const s = SECTIONS[curSect];
  const step = s.steps[curStep];

  // code lines
  let codeHTML = '';
  s.code.forEach((line, i) => {
    const active = i === step.active;
    codeHTML += `<div class="code-line${active ? ' active' : ''}">
      <span class="code-ln">${i+1}</span>
      <span class="code-arrow">${active ? '&#9658;' : '&nbsp;'}</span>
      <span class="code-text ${line.c || ''}">${line.t || '&nbsp;'}</span>
    </div>`;
  });

  // registers
  let regHTML = '';
  REGS.forEach(rn => {
    const val = step.regs[rn] || '0x0000000000000000';
    const ch = step.changed.includes(rn);
    regHTML += `<div class="reg-row${ch ? ' changed' : ''}">
      <span class="reg-name">${rn}</span>
      <span class="reg-val">${val}</span>
    </div>`;
  });

  // right panel
  let rHdr = '', rBody = '';
  if(s.panel3 === 'mem'){
    rHdr = 'Memory';
    if(!step.mem || step.mem.length === 0){
      rBody = '<div class="mem-none">No memory accessed.</div>';
    } else {
      step.mem.forEach(cell => {
        rBody += `<div class="mem-cell ${cell.cls || ''}">
          <div class="mem-addr">${cell.addr}</div>
          <div class="mem-val">${cell.val}</div>
          <div class="mem-lbl">${cell.lbl || ''}</div>
        </div>`;
      });
    }
  } else {
    rHdr = 'Flags (RFLAGS)';
    const fl = step.flags;
    const FMAP = { ZF:'Zero', CF:'Carry', SF:'Sign', OF:'Oflow' };
    let fgrid = '';
    Object.keys(FMAP).forEach(fn => {
      const set = fl[fn] === 1;
      fgrid += `<div class="flag-box${set ? ' set' : ''}">
        <div class="flag-name">${fn}</div>
        <div class="flag-val">${fl[fn] !== undefined ? fl[fn] : '&mdash;'}</div>
        <div class="flag-meaning">${FMAP[fn]}</div>
      </div>`;
    });
    rBody = `<div class="flags-grid">${fgrid}</div>`;
  }

  // step pips
  let pips = '';
  s.steps.forEach((_, i) => {
    const cls = i < curStep ? 'done' : i === curStep ? 'active' : '';
    pips += `<div class="step-pip ${cls}" onclick="goStep(${i})" title="Step ${i+1}"></div>`;
  });

  const flagsColor = s.flags_note.startsWith('Never') ? 'color:var(--success)' : 'color:var(--warning)';

  document.getElementById('section-area').innerHTML = `
    <div class="sect-head">
      <div class="sect-mnemonic">${s.mnemonic}</div>
      <div class="sect-info">
        <div class="sect-name">${s.fullname}</div>
        <div class="sect-desc">${s.desc}</div>
        <div class="sect-syntax">${s.syntax}</div><br>
        <div class="sect-flags" style="${flagsColor}">${s.flags_note}</div>
      </div>
    </div>
    <div class="sim-panels">
      <div class="sim-panel">
        <div class="sim-panel-hdr">Assembly</div>
        <div class="sim-panel-body">${codeHTML}</div>
      </div>
      <div class="sim-panel">
        <div class="sim-panel-hdr">Registers</div>
        <div class="sim-panel-body">${regHTML}</div>
      </div>
      <div class="sim-panel">
        <div class="sim-panel-hdr">${rHdr}</div>
        <div class="sim-panel-body">${rBody}</div>
      </div>
    </div>
    <div class="sim-narrative">${step.narrative}</div>
    <div class="sim-controls">
      <button class="btn-prev" onclick="prevStep()" ${curStep === 0 ? 'disabled' : ''}>&#8592; Prev</button>
      <button class="btn-next" onclick="nextStep()" ${curStep === s.steps.length - 1 ? 'disabled' : ''}>Next &#8594;</button>
      <span class="step-counter">Step ${curStep + 1} / ${s.steps.length}</span>
      <div class="step-pips">${pips}</div>
    </div>`;
}

function render(){ renderTabs(); renderSection(); }
function goStep(i){ const s=SECTIONS[curSect]; if(i>=0&&i<s.steps.length){curStep=i;render();} }
function nextStep(){ if(curStep<SECTIONS[curSect].steps.length-1){curStep++;render();} }
function prevStep(){ if(curStep>0){curStep--;render();} }

render();

/* Skin switcher */
(function(){
  var t=document.getElementById('skin-toggle'), p=document.getElementById('skin-panel');
  if(!t||!p) return;
  t.addEventListener('click', function(e){ e.stopPropagation(); p.classList.toggle('open'); });
  document.addEventListener('click', function(){ p.classList.remove('open'); });
  p.addEventListener('click', function(e){ e.stopPropagation(); });
  p.querySelectorAll('.skin-opt').forEach(function(o){
    o.addEventListener('click', function(){
      var sk = o.getAttribute('data-skin');
      document.documentElement.setAttribute('data-skin', sk);
      localStorage.setItem('bs-skin', sk);
      p.classList.remove('open');
    });
  });
})();
</script>
</body>
</html>
