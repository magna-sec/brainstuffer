<meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
<title>Email Security: SPF, DKIM &amp; DMARC — BrainStuffer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);
     min-height:100vh;padding:1.5rem 1rem 4rem;}
.wrap{max-width:880px;margin:0 auto;}
.back-link{display:inline-flex;align-items:center;gap:.4rem;color:var(--subtle);
           font-size:.8rem;text-decoration:none;margin-bottom:1.5rem;}
.back-link:hover{color:var(--accent);}
h1{color:var(--accent);font-size:1.35rem;margin-bottom:.2rem;}
.sub{color:var(--subtle);font-size:.82rem;margin-bottom:1.4rem;line-height:1.55;}

/* ── Section tabs ─────────────────────────────────────── */
.sect-tabs{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.9rem;}
.sect-tab{padding:.28rem .8rem;border-radius:6px;border:1.5px solid var(--card-border);
  background:var(--card);color:var(--subtle);font-size:.75rem;font-weight:700;
  cursor:pointer;font-family:'Courier New',monospace;
  transition:border-color .15s,color .15s,background .15s;}
.sect-tab:hover{border-color:var(--accent);color:var(--accent);}
.sect-tab.active{border-color:var(--accent);color:var(--accent);
  background:var(--bg2);box-shadow:0 0 8px var(--glow);}

/* ── Step meta ────────────────────────────────────────── */
.step-meta{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;flex-wrap:wrap;}
.step-counter{font-size:.7rem;color:var(--muted);}
.step-title-lbl{font-size:.87rem;font-weight:700;color:var(--accent);flex:1;}
.pips{display:flex;gap:4px;flex-wrap:wrap;}
.pip{width:8px;height:8px;border-radius:50%;background:var(--card-border);
     cursor:pointer;transition:background .2s,transform .2s;flex-shrink:0;}
.pip.done{background:var(--accent2);}
.pip.active{background:var(--accent);transform:scale(1.4);}

/* ── Panel ────────────────────────────────────────────── */
.panel{background:var(--card);border:1px solid var(--card-border);border-radius:10px;
       padding:.85rem 1rem;margin-bottom:.75rem;overflow-x:auto;}
.panel-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;
           letter-spacing:.09em;color:var(--muted);margin-bottom:.55rem;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
@media(max-width:580px){.two-col{grid-template-columns:1fr;}}

/* ── Flow diagram ─────────────────────────────────────── */
.flow{display:flex;align-items:center;justify-content:center;gap:.1rem;
      flex-wrap:wrap;padding:.5rem 0;}
.flow-node{display:flex;flex-direction:column;align-items:center;gap:.3rem;}
.flow-box{border:1.5px solid var(--card-border);border-radius:8px;background:var(--bg2);
          padding:.45rem .7rem;font-size:.73rem;font-weight:700;text-align:center;
          transition:border-color .3s,background .3s,box-shadow .3s;white-space:nowrap;}
.flow-box small{font-weight:400;color:var(--muted);display:block;font-size:.65rem;}
.flow-box.hl {border-color:var(--accent);background:rgba(129,140,248,.12);box-shadow:0 0 10px var(--glow);}
.flow-box.hl2{border-color:var(--accent2);background:rgba(52,211,153,.1);}
.flow-box.warn{border-color:#fbbf24;background:rgba(251,191,36,.09);}
.flow-box.danger{border-color:#f87171;background:rgba(248,113,113,.09);}
.flow-box.ok  {border-color:#4ade80;background:rgba(74,222,128,.09);}
.flow-icon{font-size:1.4rem;line-height:1;}
.flow-lbl{font-size:.62rem;color:var(--muted);text-align:center;max-width:90px;}
.flow-arr{font-size:1rem;color:var(--muted);padding:0 .2rem;align-self:center;flex-shrink:0;}
.flow-arr.hl{color:var(--accent);}

/* ── Record token rows ────────────────────────────────── */
.record-raw{font-family:'Courier New',monospace;font-size:.77rem;background:var(--bg2);
            border-radius:6px;padding:.65rem .9rem;margin-bottom:.7rem;overflow-x:auto;
            white-space:pre;color:var(--text);border:1px solid var(--card-border);line-height:1.6;}
.tokens{display:flex;flex-direction:column;gap:.3rem;}
.tok-row{display:grid;grid-template-columns:auto auto 1fr;align-items:baseline;
         gap:.5rem;padding:.3rem .45rem;border-radius:6px;background:var(--bg2);
         border:1px solid var(--card-border);}
.tok-key{font-weight:900;font-size:.78rem;white-space:nowrap;}
.tok-val{font-size:.76rem;font-family:'Courier New',monospace;white-space:nowrap;}
.tok-desc{font-size:.7rem;color:var(--muted);line-height:1.4;}
.tok-v .tok-key{color:var(--muted);}        .tok-v .tok-val{color:var(--muted);}
.tok-p .tok-key{color:#4ade80;}              .tok-p .tok-val{color:#4ade80;}
.tok-a .tok-key{color:var(--accent);}        .tok-a .tok-val{color:var(--accent2);}
.tok-r .tok-key{color:var(--accent2);}       .tok-r .tok-val{color:var(--accent2);}
.tok-w .tok-key{color:#fbbf24;}              .tok-w .tok-val{color:#fbbf24;}
.tok-x .tok-key{color:#f87171;}              .tok-x .tok-val{color:#f87171;}

/* ── Envelope display ─────────────────────────────────── */
.env-rows{display:flex;flex-direction:column;gap:.5rem;}
.env-row{border-radius:8px;padding:.55rem .85rem;display:flex;align-items:flex-start;
         gap:.7rem;font-size:.82rem;}
.env-row.smtp  {background:rgba(129,140,248,.07);border:1.5px solid var(--accent);}
.env-row.hdr   {background:rgba(52,211,153,.06);border:1.5px solid var(--accent2);}
.env-badge{font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;
           padding:.15rem .45rem;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.env-badge.smtp{background:rgba(129,140,248,.2);color:var(--accent);}
.env-badge.hdr {background:rgba(52,211,153,.15);color:var(--accent2);}
.env-val{font-family:'Courier New',monospace;color:var(--text);}
.env-note{font-size:.65rem;color:var(--muted);margin-top:.18rem;line-height:1.4;}

/* ── Check result pill ────────────────────────────────── */
.chk{display:flex;align-items:center;gap:.5rem;margin-top:.5rem;font-size:.82rem;
     font-weight:700;padding:.4rem .75rem;border-radius:7px;}
.chk.pass{background:rgba(74,222,128,.09);border:1px solid #4ade80;color:#4ade80;}
.chk.fail{background:rgba(248,113,113,.09);border:1px solid #f87171;color:#f87171;}
.chk.soft{background:rgba(251,191,36,.09);border:1px solid #fbbf24;color:#fbbf24;}
.chk.none{background:var(--bg2);border:1px solid var(--card-border);color:var(--muted);}

/* ── Table ────────────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:.79rem;}
.tbl th{text-align:left;color:var(--muted);font-size:.67rem;font-weight:700;
        text-transform:uppercase;letter-spacing:.05em;
        padding:.3rem .6rem;border-bottom:1px solid var(--card-border);}
.tbl td{padding:.38rem .6rem;border-bottom:1px solid rgba(100,116,139,.12);vertical-align:top;}
.tbl td:first-child{font-family:'Courier New',monospace;font-weight:700;}
.tbl .r{color:#f87171;} .tbl .y{color:#fbbf24;} .tbl .g{color:#4ade80;}
.tbl .d{color:var(--muted);}

/* ── Alignment matrix ─────────────────────────────────── */
.matrix{border-collapse:collapse;font-size:.78rem;width:100%;}
.matrix th{background:var(--bg2);padding:.38rem .65rem;color:var(--muted);
           font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;
           text-align:center;border:1px solid var(--card-border);}
.matrix td{padding:.42rem .65rem;text-align:center;border:1px solid var(--card-border);
           font-size:.78rem;}
.matrix td.pass{background:rgba(74,222,128,.09);color:#4ade80;font-weight:700;}
.matrix td.fail{background:rgba(248,113,113,.09);color:#f87171;font-weight:700;}
.matrix td.na  {background:var(--bg2);color:var(--muted);}
.matrix td.rh  {font-weight:700;text-align:left;background:var(--bg2);color:var(--text);
                font-size:.76rem;}

/* ── Key pair ─────────────────────────────────────────── */
.key-pair{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
@media(max-width:480px){.key-pair{grid-template-columns:1fr;}}
.key-box{border-radius:8px;padding:.7rem .85rem;font-size:.78rem;}
.key-box.priv{background:rgba(248,113,113,.07);border:1.5px solid rgba(248,113,113,.35);}
.key-box.pub {background:rgba(52,211,153,.06);border:1.5px solid rgba(52,211,153,.3);}
.key-lbl{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;}
.key-box.priv .key-lbl{color:#f87171;} .key-box.pub .key-lbl{color:#4ade80;}
.key-val{font-family:'Courier New',monospace;color:var(--muted);font-size:.71rem;word-break:break-all;line-height:1.5;}

/* ── DNS lookup display ───────────────────────────────── */
.dns-lookup{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;
            margin-bottom:.5rem;font-size:.76rem;}
.dns-q{background:rgba(129,140,248,.1);border:1px solid var(--accent);
       border-radius:5px;padding:.18rem .5rem;color:var(--accent);}
.dns-arr{color:var(--muted);}
.dns-a{background:rgba(52,211,153,.09);border:1px solid var(--accent2);
       border-radius:5px;padding:.18rem .5rem;color:var(--accent2);}

/* ── Attack boxes ─────────────────────────────────────── */
.atk{border-radius:10px;padding:.8rem 1rem;margin-bottom:.7rem;border:1.5px solid;}
.atk.bad{border-color:#f87171;background:rgba(248,113,113,.06);}
.atk.good{border-color:#4ade80;background:rgba(74,222,128,.06);}
.atk.warn{border-color:#fbbf24;background:rgba(251,191,36,.06);}
.atk-lbl{font-size:.63rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;}
.atk.bad .atk-lbl{color:#f87171;} .atk.good .atk-lbl{color:#4ade80;} .atk.warn .atk-lbl{color:#fbbf24;}
.atk-body{font-size:.8rem;line-height:1.65;}
.atk-body code{color:var(--accent2);font-size:.78rem;}
.astep{display:flex;align-items:flex-start;gap:.45rem;margin:.3rem 0;font-size:.79rem;}
.anum{width:17px;height:17px;border-radius:50%;background:rgba(248,113,113,.18);color:#f87171;
      font-size:.62rem;font-weight:900;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;margin-top:.12rem;}
.typo{color:#f87171;font-weight:900;text-decoration:underline wavy #f87171;}
.good-txt{color:#4ade80;font-weight:900;}

/* ── Narrative ────────────────────────────────────────── */
.narr{border-left:2px solid var(--accent);
      background:linear-gradient(90deg,rgba(129,140,248,.08) 0%,transparent 65%);
      border-radius:0 8px 8px 0;padding:.7rem .95rem;
      font-size:.85rem;line-height:1.65;margin-bottom:.75rem;}
.narr strong{color:var(--accent);}
.narr code{color:var(--accent2);font-size:.82rem;}
.narr .g{color:#4ade80;font-weight:700;} .narr .r{color:#f87171;font-weight:700;}
.narr .y{color:#fbbf24;font-weight:700;}

/* ── Quiz ─────────────────────────────────────────────── */
.quiz-card{background:var(--card);border:1.5px solid var(--accent);border-radius:10px;
           padding:.85rem 1rem;margin-bottom:.75rem;box-shadow:0 0 12px var(--glow);}
.quiz-q{font-size:.85rem;font-weight:700;color:var(--accent);margin-bottom:.65rem;}
.quiz-opts{display:flex;flex-direction:column;gap:.4rem;}
.q-opt{background:var(--bg2);border:1.5px solid var(--card-border);border-radius:7px;
       padding:.5rem .8rem;font-family:'Courier New',monospace;font-size:.8rem;
       color:var(--text);cursor:pointer;text-align:left;
       transition:border-color .12s,background .12s;}
.q-opt:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.q-opt.q-correct{border-color:#4ade80;background:rgba(74,222,128,.1);color:#4ade80;cursor:default;}
.q-opt.q-wrong  {border-color:#f87171;background:rgba(248,113,113,.08);color:#f87171;cursor:default;}
.q-opt.q-dim    {opacity:.35;cursor:default;}
.q-explain{margin-top:.6rem;font-size:.78rem;color:var(--subtle);line-height:1.55;
           border-left:2px solid #4ade80;padding-left:.65rem;display:none;}
.q-explain.show{display:block;}

/* ── Nav ──────────────────────────────────────────────── */
.nav-row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;}
.btn-nav{padding:.5rem 1.1rem;border-radius:7px;font-family:'Courier New',monospace;
         font-size:.82rem;font-weight:700;cursor:pointer;
         border:1.5px solid var(--card-border);background:var(--card);color:var(--subtle);
         transition:border-color .15s,color .15s;}
.btn-nav:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.btn-nav.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-nav.primary:hover:not(:disabled){opacity:.85;}
.btn-nav:disabled{opacity:.28;cursor:default;}
</style>
</head>
<body>

<div class="wrap">
  <a class="back-link" href="../index.html#learn">&#8592; Back to Interactive Learning</a>
  <h1>&#128231; Email Security: SPF, DKIM &amp; DMARC</h1>
  <p class="sub">How email authentication works — and what attackers look for when it breaks.</p>

  <div class="sect-tabs" id="sect-tabs"></div>

  <div class="step-meta">
    <span class="step-counter" id="step-counter">Step 1 / 1</span>
    <span class="step-title-lbl" id="step-title"></span>
    <div class="pips" id="pips"></div>
  </div>

  <div id="main-display"></div>
  <div class="narr" id="narr"></div>
  <div id="quiz-area"></div>

  <div class="nav-row">
    <button class="btn-nav" id="btn-prev">&#8592; Prev</button>
    <button class="btn-nav primary" id="btn-next">Next &#8594;</button>
  </div>
</div>

<script>
/* ── Quiz state ─────────────────────────────────────────── */
var quizAnswered = {};

function renderQuiz(q, key) {
  if (!q) return '';
  var ans = quizAnswered[key];
  var html = '<div class="quiz-card"><div class="quiz-q">&#10067; ' + q.q + '</div><div class="quiz-opts" id="qo-' + key + '">';
  q.opts.forEach(function(opt, i) {
    var cls = 'q-opt';
    if (ans !== undefined) {
      if (i === q.correct) cls += ' q-correct';
      else if (i === ans) cls += ' q-wrong';
      else cls += ' q-dim';
    }
    html += '<button class="' + cls + '"' + (ans !== undefined ? ' disabled' : '') +
      ' onclick="answerQuiz(\'' + key + '\',' + i + ')">' + opt + '</button>';
  });
  html += '</div>';
  if (ans !== undefined) html += '<div class="q-explain show">' + q.explain + '</div>';
  html += '</div>';
  return html;
}

function answerQuiz(key, i) {
  quizAnswered[key] = i;
  renderAll();
}

/* ── Tiny helpers ───────────────────────────────────────── */
function panel(lbl, inner) {
  return '<div class="panel"><div class="panel-lbl">' + lbl + '</div>' + inner + '</div>';
}
function tok(cls, key, val, desc) {
  return '<div class="tok-row tok-' + cls + '"><span class="tok-key">' + key +
    '</span><span class="tok-val">' + val + '</span><span class="tok-desc">' + desc + '</span></div>';
}
function atk(cls, lbl, body) {
  return '<div class="atk ' + cls + '"><div class="atk-lbl">' + lbl + '</div><div class="atk-body">' + body + '</div></div>';
}
function chk(cls, txt) {
  return '<div class="chk ' + cls + '">' + txt + '</div>';
}
function fnode(icon, label, boxCls, note) {
  return '<div class="flow-node">' +
    (icon ? '<div class="flow-icon">' + icon + '</div>' : '') +
    '<div class="flow-box' + (boxCls ? ' ' + boxCls : '') + '">' + label + '</div>' +
    (note ? '<div class="flow-lbl">' + note + '</div>' : '') +
    '</div>';
}
function farr(hl) { return '<div class="flow-arr' + (hl ? ' hl' : '') + '">&#8594;</div>'; }
function astep(n, html) {
  return '<div class="astep"><div class="anum">' + n + '</div><div>' + html + '</div></div>';
}

/* ── Section / step data ────────────────────────────────── */
var SECTIONS = [

/* ════════════════════════════════════════════════════════
   0 · MX RECORDS
   ════════════════════════════════════════════════════════ */
{
  label: '1 · MX',
  steps: [
    {
      title: 'MX Records: routing email to the right server',
      display: function() {
        return panel('DNS MX lookup — "Who receives mail for example.com?"',
          '<div class="flow" style="gap:.25rem;">' +
            fnode('&#128140;', 'alice<br>@company.com', 'hl', 'Sender') +
            farr(true) +
            fnode('&#127968;', 'company.com<br><small>SMTP / MTA</small>', '') +
            farr() +
            '<div class="flow-node"><div style="font-size:.67rem;color:var(--muted);text-align:center;margin-bottom:.22rem;">DNS query:<br><code style="color:var(--accent);">MX example.com</code></div>' +
            '<div class="flow-box warn">&#127760; DNS</div></div>' +
            farr() +
            fnode('&#127968;', 'mail.example.com<br><small>:25 SMTP</small>', 'hl2', 'Highest-priority MX') +
            farr(true) +
            fnode('&#128235;', 'bob<br>@example.com', 'hl', 'Delivered') +
          '</div>') +
        panel('DNS response — priority-ordered list of mail servers',
          '<div class="tokens">' +
            tok('a','example.com.','MX 10  mail.example.com.','Primary — lower number = higher priority, tried first') +
            tok('r','example.com.','MX 20  backup.example.com.','Fallback — only used if priority 10 is unreachable') +
          '</div>');
      },
      narr: 'Before Alice\'s server can deliver to <strong>bob@example.com</strong> it asks DNS: "What mail servers accept mail for this domain?" DNS returns <strong>MX (Mail eXchanger) records</strong> — a priority-ordered list of hostnames. Lower number = higher priority. The sender tries the highest-priority host first; if it\'s down, it tries the next. This is why you typically see two or three MX entries: pure <strong>redundancy</strong>, not load balancing.',
      quiz: null
    },
    {
      title: 'MX routes mail — it does not authenticate it',
      display: function() {
        return panel('Any server on the internet can knock on your MX port',
          '<div class="flow" style="gap:.25rem;flex-wrap:wrap;">' +
            fnode('&#128373;', 'attacker<br>server', 'danger', 'Any random IP') +
            farr() +
            '<div class="flow-node">' +
              '<div class="flow-box hl" style="text-align:left;padding:.5rem .8rem;">' +
                '<strong>mail.example.com:25</strong><br>' +
                '<small style="font-weight:400;">HELO attacker.net<br>MAIL FROM: &lt;ceo@example.com&gt;<br>RCPT TO: &lt;bob@example.com&gt;</small>' +
              '</div>' +
            '</div>' +
            farr() +
            fnode('&#128235;', 'Bob\'s inbox?', 'warn', 'Spoofed sender<br>delivered?') +
          '</div>') +
        '<div class="two-col">' +
          atk('bad', '&#9888; The gap', 'MX records tell any sender where to connect. They say nothing about whether the sender is who they claim to be. Anyone can send <code>MAIL FROM: &lt;ceo@yourdomain.com&gt;</code> — MX routing will accept the connection.') +
          atk('good', '&#10003; The fix (next 3 sections)', 'SPF, DKIM, and DMARC are the three authentication layers bolted on top of the MX routing system. Together they answer: "Is this sender actually authorised to use this From: address?"') +
        '</div>';
      },
      narr: 'MX solves a routing problem, not a security problem. <strong>The SMTP protocol has no built-in sender verification.</strong> Any host can connect to your mail server and claim any From: address. This is why email spoofing has been trivially easy since the 1970s. SPF, DKIM, and DMARC are the retrofit authentication stack that addresses this — each layer closes a different gap.',
      quiz: null
    }
  ]
},

/* ════════════════════════════════════════════════════════
   1 · SPF
   ════════════════════════════════════════════════════════ */
{
  label: '2 · SPF',
  steps: [
    {
      title: 'SPF: a DNS allowlist of authorised sending IPs',
      display: function() {
        return panel('DNS TXT record published at: example.com',
          '<div class="record-raw">v=spf1  ip4:203.0.113.0/24  include:_spf.google.com  -all</div>' +
          '<div class="tokens">' +
            tok('v','v=spf1','','Version — must be first; identifies this as an SPF record') +
            tok('a','ip4:','203.0.113.0/24','This /24 block of IP addresses is authorised to send mail as example.com') +
            tok('a','include:','_spf.google.com','Fetch Google\'s SPF and add all their IPs too (used when you send via Google Workspace)') +
            tok('x','-all','','<strong>Hard fail</strong> — any IP not matched by the above mechanisms must be rejected') +
          '</div>') +
        panel('How the check runs at the receiving server',
          '<div class="flow" style="gap:.25rem;flex-wrap:wrap;">' +
            fnode('&#127968;', 'phishing server<br><small>IP: 1.2.3.4</small>', 'danger') +
            farr() +
            '<div class="flow-node">' +
              '<div class="flow-box hl">' +
                'mail.example.com<br><small>looks up SPF for<br>example.com</small>' +
              '</div>' +
            '</div>' +
            farr() +
            '<div class="flow-node">' +
              '<div class="flow-box danger">SPF: FAIL<br><small>1.2.3.4 not listed</small></div>' +
              '<div class="flow-lbl">-all → reject</div>' +
            '</div>' +
          '</div>');
      },

            tok('a','s=','mail','<strong>Selector</strong> — which key to look up: mail._domainkey.example.com') +

          '<div class="record-raw"># DMARC record\ndig +short TXT _dmarc.example.com\n\n# SPF record\ndig +short TXT example.com\n\n# Extract rua/ruf destination domains\ndig +short TXT _dmarc.example.com \\\n  | grep -oE \'mailto:[^;,"]+\' | sed \'s/.*@//\'\n# → whois each domain that appears\n\n# DKIM key (replace \'mail\' with actual selector)\ndig +short TXT mail._domainkey.example.com</div>');
      },
      narr: 'The full email attack surface is broader than just spoofing. <strong>Report leakage</strong> (typo\'d rua/ruf) is passive intelligence gathering — the attacker collects your telemetry silently for months. <strong>Dangling SPF includes</strong> grant them authorised-sender status. <strong>Permanent p=none</strong> means zero enforcement regardless of SPF/DKIM quality. A few <code>dig</code> commands and a <code>whois</code> on each output domain is enough to find all of these in under five minutes.',
      quiz: {
        q: 'You run <code>dig +short TXT _dmarc.example.com</code> and get: <code>v=DMARC1; p=none; rua=mailto:dmarcreports@example.com</code>. As an attacker, what is the most immediately actionable finding?',
        opts: [
          'p=none — you can spoof From: example.com addresses directly and they will be delivered',
          'The rua domain is on example.com so there is no typosquat opportunity',
          'DMARC is absent so no further checks are needed',
          'rua reports are encrypted so no data is exposed'
        ],
        correct: 0,
        explain: 'p=none means the DMARC policy takes no enforcement action. Any email failing DMARC alignment is still delivered normally. An attacker can send convincing phishing emails with From: ceo@example.com and they will land in recipients\' inboxes. The rua points to example.com itself — no typosquat opportunity there, which is actually the correct/safe configuration for rua.'
      }
    }
  ]
}

];

/* ── Navigation state ───────────────────────────────────── */
var curSect = 0;
var curStep = 0;

function renderAll() {
  var sect = SECTIONS[curSect];
  var step = sect.steps[curStep];
  var key  = curSect + '_' + curStep;

  /* tabs */
  document.getElementById('sect-tabs').innerHTML = SECTIONS.map(function(s, i) {
    var cls = 'sect-tab' + (i === curSect ? ' active' : '');
    return '<button class="' + cls + '" onclick="goSect(' + i + ')">' + s.label + '</button>';
  }).join('');

  /* counter + title */
  document.getElementById('step-counter').textContent =
    'Step ' + (curStep + 1) + ' / ' + sect.steps.length;
  document.getElementById('step-title').textContent = step.title;

  /* pips */
  document.getElementById('pips').innerHTML = sect.steps.map(function(_, i) {
    var cls = 'pip' + (i < curStep ? ' done' : '') + (i === curStep ? ' active' : '');
    return '<div class="' + cls + '" onclick="goStepDirect(' + i + ')"></div>';
  }).join('');

  /* main display */
  document.getElementById('main-display').innerHTML = step.display();

  /* narrative */
  document.getElementById('narr').innerHTML = step.narr;

  /* quiz */
  document.getElementById('quiz-area').innerHTML = renderQuiz(step.quiz, key);

  /* nav buttons */
  document.getElementById('btn-prev').disabled = (curSect === 0 && curStep === 0);
  var isLast = (curSect === SECTIONS.length - 1 && curStep === sect.steps.length - 1);
  var btnNext = document.getElementById('btn-next');
  btnNext.innerHTML = isLast ? '&#10003; Done' : 'Next &#8594;';
  btnNext.disabled = false;

  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goSect(i) { curSect = i; curStep = 0; renderAll(); }
function goStepDirect(i) { curStep = i; renderAll(); }

document.getElementById('btn-next').addEventListener('click', function() {
  var sect = SECTIONS[curSect];
  if (curStep < sect.steps.length - 1) {
    curStep++;
  } else if (curSect < SECTIONS.length - 1) {
    curSect++;
    curStep = 0;
  }
  renderAll();
});

document.getElementById('btn-prev').addEventListener('click', function() {
  if (curStep > 0) {
    curStep--;
  } else if (curSect > 0) {
    curSect--;
    curStep = SECTIONS[curSect].steps.length - 1;
  }
  renderAll();
});

renderAll();
</script>
