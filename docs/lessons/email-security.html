<!DOCTYPE html>
<html lang="en" data-skin="aero">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
<title>Email Security: SPF, DKIM &amp; DMARC — BrainStuffer</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../css/style.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);
     min-height:100vh;padding:1.5rem 1rem 4rem;}
.wrap{max-width:880px;margin:0 auto;}
.back-link{display:inline-flex;align-items:center;gap:.4rem;color:var(--subtle);
           font-size:.8rem;text-decoration:none;margin-bottom:1.5rem;}
.back-link:hover{color:var(--accent);}
h1{color:var(--accent);font-size:1.35rem;margin-bottom:.2rem;}
.sub{color:var(--subtle);font-size:.82rem;margin-bottom:1.4rem;line-height:1.55;}

/* ── Section tabs ──────────────────────────────────── */
.sect-tabs{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.9rem;}
.sect-tab{padding:.32rem .75rem;border-radius:6px;border:1.5px solid var(--card-border);
  background:var(--card);color:var(--subtle);font-size:.75rem;font-weight:700;
  cursor:pointer;font-family:'Courier New',monospace;min-height:36px;
  transition:border-color .15s,color .15s,background .15s;}
.sect-tab:hover{border-color:var(--accent);color:var(--accent);}
.sect-tab.active{border-color:var(--accent);color:var(--accent);
  background:var(--bg2);box-shadow:0 0 8px var(--glow);}

/* ── Step meta ─────────────────────────────────────── */
.step-meta{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;flex-wrap:wrap;}
.step-counter{font-size:.72rem;color:var(--muted);flex-shrink:0;}
.step-title-lbl{font-size:.87rem;font-weight:700;color:var(--accent);flex:1;min-width:0;}
.pips{display:flex;gap:5px;flex-wrap:wrap;}
.pip{width:10px;height:10px;border-radius:50%;background:var(--card-border);
     cursor:pointer;transition:background .2s,transform .2s;flex-shrink:0;}
.pip.done{background:var(--accent2);}
.pip.active{background:var(--accent);transform:scale(1.35);}

/* ── Panel ─────────────────────────────────────────── */
.panel{background:var(--card);border:1px solid var(--card-border);border-radius:10px;
       padding:.85rem 1rem;margin-bottom:.75rem;}
.panel-lbl{font-size:.63rem;font-weight:700;text-transform:uppercase;
           letter-spacing:.09em;color:var(--muted);margin-bottom:.55rem;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
@media(max-width:600px){.two-col{grid-template-columns:1fr;}}

/* ── Flow diagram ──────────────────────────────────── */
.flow{display:flex;align-items:center;justify-content:center;gap:.15rem;
      flex-wrap:wrap;padding:.5rem 0;}
.flow-node{display:flex;flex-direction:column;align-items:center;gap:.3rem;}
.flow-box{border:1.5px solid var(--card-border);border-radius:8px;background:var(--bg2);
          padding:.45rem .65rem;font-size:.73rem;font-weight:700;text-align:center;
          transition:border-color .3s,background .3s,box-shadow .3s;}
.flow-box small{font-weight:400;color:var(--muted);display:block;font-size:.64rem;}
.flow-box.hl {border-color:var(--accent);background:rgba(129,140,248,.12);box-shadow:0 0 10px var(--glow);}
.flow-box.hl2{border-color:var(--accent2);background:rgba(52,211,153,.1);}
.flow-box.warn{border-color:#fbbf24;background:rgba(251,191,36,.09);}
.flow-box.danger{border-color:#f87171;background:rgba(248,113,113,.09);}
.flow-box.ok{border-color:#4ade80;background:rgba(74,222,128,.09);}
.flow-icon{font-size:1.4rem;line-height:1;}
.flow-lbl{font-size:.63rem;color:var(--muted);text-align:center;max-width:96px;}
.flow-arr{font-size:1rem;color:var(--muted);padding:0 .15rem;align-self:center;flex-shrink:0;}
.flow-arr.hl{color:var(--accent);}

/* ── Record token rows ─────────────────────────────── */
.record-raw{font-family:'Courier New',monospace;font-size:.77rem;background:var(--bg2);
            border-radius:6px;padding:.65rem .9rem;margin-bottom:.7rem;overflow-x:auto;
            white-space:pre;color:var(--text);border:1px solid var(--card-border);line-height:1.6;}
.tokens{display:flex;flex-direction:column;gap:.3rem;}
.tok-row{display:grid;grid-template-columns:auto auto 1fr;align-items:baseline;
         gap:.5rem .6rem;padding:.32rem .45rem;border-radius:6px;background:var(--bg2);
         border:1px solid var(--card-border);}
.tok-key{font-weight:900;font-size:.78rem;white-space:nowrap;}
.tok-val{font-size:.76rem;font-family:'Courier New',monospace;white-space:nowrap;}
.tok-desc{font-size:.7rem;color:var(--muted);line-height:1.45;min-width:0;}
.tok-v .tok-key{color:var(--muted);}   .tok-v .tok-val{color:var(--muted);}
.tok-p .tok-key{color:#4ade80;}         .tok-p .tok-val{color:#4ade80;}
.tok-a .tok-key{color:var(--accent);}   .tok-a .tok-val{color:var(--accent2);}
.tok-r .tok-key{color:var(--accent2);}  .tok-r .tok-val{color:var(--accent2);}
.tok-w .tok-key{color:#fbbf24;}         .tok-w .tok-val{color:#fbbf24;}
.tok-x .tok-key{color:#f87171;}         .tok-x .tok-val{color:#f87171;}
@media(max-width:500px){
  .tok-row{grid-template-columns:1fr;gap:.18rem;}
  .tok-val{color:var(--accent2);}
}

/* ── Envelope display ──────────────────────────────── */
.env-rows{display:flex;flex-direction:column;gap:.5rem;}
.env-row{border-radius:8px;padding:.55rem .85rem;display:flex;align-items:flex-start;
         gap:.65rem;font-size:.81rem;}
.env-row.smtp{background:rgba(129,140,248,.07);border:1.5px solid var(--accent);}
.env-row.hdr {background:rgba(52,211,153,.06);border:1.5px solid var(--accent2);}
.env-badge{font-size:.57rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;
           padding:.15rem .4rem;border-radius:4px;white-space:nowrap;flex-shrink:0;line-height:1.5;}
.env-badge.smtp{background:rgba(129,140,248,.2);color:var(--accent);}
.env-badge.hdr {background:rgba(52,211,153,.15);color:var(--accent2);}
.env-val{font-family:'Courier New',monospace;color:var(--text);word-break:break-all;}
.env-note{font-size:.65rem;color:var(--muted);margin-top:.18rem;line-height:1.4;}

/* ── Check result pill ─────────────────────────────── */
.chk{display:flex;align-items:center;gap:.5rem;margin-top:.5rem;font-size:.82rem;
     font-weight:700;padding:.42rem .75rem;border-radius:7px;}
.chk.pass{background:rgba(74,222,128,.09);border:1px solid #4ade80;color:#4ade80;}
.chk.fail{background:rgba(248,113,113,.09);border:1px solid #f87171;color:#f87171;}
.chk.soft{background:rgba(251,191,36,.09);border:1px solid #fbbf24;color:#fbbf24;}
.chk.none{background:var(--bg2);border:1px solid var(--card-border);color:var(--muted);}

/* ── Table ─────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;margin-bottom:0;}
.tbl{width:100%;border-collapse:collapse;font-size:.79rem;min-width:380px;}
.tbl th{text-align:left;color:var(--muted);font-size:.67rem;font-weight:700;
        text-transform:uppercase;letter-spacing:.05em;
        padding:.3rem .55rem;border-bottom:1px solid var(--card-border);}
.tbl td{padding:.38rem .55rem;border-bottom:1px solid rgba(100,116,139,.12);vertical-align:top;}
.tbl td:first-child{font-family:'Courier New',monospace;font-weight:700;white-space:nowrap;}
.tbl .r{color:#f87171;} .tbl .y{color:#fbbf24;} .tbl .g{color:#4ade80;} .tbl .d{color:var(--muted);}

/* ── Alignment matrix ──────────────────────────────── */
.matrix-wrap{overflow-x:auto;}
.matrix{border-collapse:collapse;font-size:.77rem;width:100%;min-width:420px;}
.matrix th{background:var(--bg2);padding:.35rem .6rem;color:var(--muted);
           font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;
           text-align:center;border:1px solid var(--card-border);}
.matrix td{padding:.4rem .6rem;text-align:center;border:1px solid var(--card-border);font-size:.77rem;}
.matrix td.pass{background:rgba(74,222,128,.09);color:#4ade80;font-weight:700;}
.matrix td.fail{background:rgba(248,113,113,.09);color:#f87171;font-weight:700;}
.matrix td.na{background:var(--bg2);color:var(--muted);}
.matrix td.rh{font-weight:700;text-align:left;background:var(--bg2);color:var(--text);font-size:.75rem;}

/* ── Key pair ──────────────────────────────────────── */
.key-pair{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
@media(max-width:500px){.key-pair{grid-template-columns:1fr;}}
.key-box{border-radius:8px;padding:.7rem .85rem;font-size:.78rem;}
.key-box.priv{background:rgba(248,113,113,.07);border:1.5px solid rgba(248,113,113,.35);}
.key-box.pub {background:rgba(52,211,153,.06);border:1.5px solid rgba(52,211,153,.3);}
.key-lbl{font-size:.61rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;}
.key-box.priv .key-lbl{color:#f87171;} .key-box.pub .key-lbl{color:#4ade80;}
.key-val{font-family:'Courier New',monospace;color:var(--muted);font-size:.71rem;word-break:break-all;line-height:1.5;}

/* ── DNS lookup ────────────────────────────────────── */
.dns-lookup{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem;font-size:.76rem;}
.dns-q{background:rgba(129,140,248,.1);border:1px solid var(--accent);border-radius:5px;padding:.18rem .5rem;color:var(--accent);}
.dns-arr{color:var(--muted);}
.dns-a{background:rgba(52,211,153,.09);border:1px solid var(--accent2);border-radius:5px;padding:.18rem .5rem;color:var(--accent2);word-break:break-all;}

/* ── Attack boxes ──────────────────────────────────── */
.atk{border-radius:10px;padding:.8rem 1rem;margin-bottom:.7rem;border:1.5px solid;}
.atk.bad {border-color:#f87171;background:rgba(248,113,113,.06);}
.atk.good{border-color:#4ade80;background:rgba(74,222,128,.06);}
.atk.warn{border-color:#fbbf24;background:rgba(251,191,36,.06);}
.atk.info{border-color:var(--accent);background:rgba(129,140,248,.06);}
.atk-lbl{font-size:.63rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;}
.atk.bad  .atk-lbl{color:#f87171;}
.atk.good .atk-lbl{color:#4ade80;}
.atk.warn .atk-lbl{color:#fbbf24;}
.atk.info .atk-lbl{color:var(--accent);}
.atk-body{font-size:.8rem;line-height:1.65;}
.atk-body code{color:var(--accent2);font-size:.78rem;}
.astep{display:flex;align-items:flex-start;gap:.45rem;margin:.32rem 0;font-size:.8rem;line-height:1.55;}
.anum{width:18px;height:18px;border-radius:50%;background:rgba(248,113,113,.18);color:#f87171;
      font-size:.63rem;font-weight:900;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;margin-top:.13rem;}
.typo{color:#f87171;font-weight:900;text-decoration:underline wavy #f87171;}
.good-txt{color:#4ade80;font-weight:900;}

/* ── Spoofing comparison ───────────────────────────── */
.spoof-compare{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.6rem;}
@media(max-width:540px){.spoof-compare{grid-template-columns:1fr;}}
.spoof-box{border-radius:8px;padding:.65rem .8rem;font-size:.78rem;line-height:1.55;}
.spoof-box.legit{border:1.5px solid var(--accent2);background:rgba(52,211,153,.06);}
.spoof-box.attack{border:1.5px solid #f87171;background:rgba(248,113,113,.06);}
.spoof-lbl{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;}
.spoof-box.legit  .spoof-lbl{color:var(--accent2);}
.spoof-box.attack .spoof-lbl{color:#f87171;}
.spoof-field{font-family:'Courier New',monospace;font-size:.74rem;margin:.12rem 0;color:var(--muted);}
.spoof-field strong{color:var(--text);}
.spoof-field .hi{color:#f87171;font-weight:900;}
.spoof-field .ok{color:#4ade80;font-weight:900;}

/* ── Narrative ─────────────────────────────────────── */
.narr{border-left:2px solid var(--accent);
      background:linear-gradient(90deg,rgba(129,140,248,.08) 0%,transparent 65%);
      border-radius:0 8px 8px 0;padding:.7rem .95rem;
      font-size:.85rem;line-height:1.68;margin-bottom:.75rem;}
.narr strong{color:var(--accent);}
.narr code{color:var(--accent2);font-size:.82rem;}
.narr .g{color:#4ade80;font-weight:700;}
.narr .r{color:#f87171;font-weight:700;}
.narr .y{color:#fbbf24;font-weight:700;}

/* ── Quiz ──────────────────────────────────────────── */
.quiz-card{background:var(--card);border:1.5px solid var(--accent);border-radius:10px;
           padding:.85rem 1rem;margin-bottom:.75rem;box-shadow:0 0 12px var(--glow);}
.quiz-q{font-size:.85rem;font-weight:700;color:var(--accent);margin-bottom:.65rem;line-height:1.5;}
.quiz-opts{display:flex;flex-direction:column;gap:.4rem;}
.q-opt{background:var(--bg2);border:1.5px solid var(--card-border);border-radius:7px;
       padding:.55rem .85rem;font-family:'Courier New',monospace;font-size:.8rem;
       color:var(--text);cursor:pointer;text-align:left;min-height:44px;
       transition:border-color .12s,background .12s;line-height:1.4;}
.q-opt:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.q-opt.q-correct{border-color:#4ade80;background:rgba(74,222,128,.1);color:#4ade80;cursor:default;}
.q-opt.q-wrong  {border-color:#f87171;background:rgba(248,113,113,.08);color:#f87171;cursor:default;}
.q-opt.q-dim    {opacity:.35;cursor:default;}
.q-explain{margin-top:.65rem;font-size:.79rem;color:var(--subtle);line-height:1.58;
           border-left:2px solid #4ade80;padding-left:.65rem;display:none;}
.q-explain.show{display:block;}

/* ── Nav ───────────────────────────────────────────── */
.nav-row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;}
.btn-nav{padding:.55rem 1.2rem;border-radius:7px;font-family:'Courier New',monospace;
         font-size:.83rem;font-weight:700;cursor:pointer;min-height:44px;
         border:1.5px solid var(--card-border);background:var(--card);color:var(--subtle);
         transition:border-color .15s,color .15s;}
.btn-nav:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.btn-nav.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-nav.primary:hover:not(:disabled){opacity:.85;}
.btn-nav:disabled{opacity:.28;cursor:default;}

/* ── Mobile tweaks ─────────────────────────────────── */
@media(max-width:480px){
  h1{font-size:1.15rem;}
  .sub{font-size:.79rem;}
  .sect-tab{font-size:.72rem;padding:.3rem .6rem;}
  .narr{font-size:.82rem;}
  .flow-box{font-size:.69rem;padding:.4rem .55rem;}
  body{padding:1rem .75rem 3rem;}
}
</style>

<div class="wrap">
  <a class="back-link" href="../index.html#learn">&#8592; Back to Interactive Learning</a>
  <h1>&#128231; Email Security: SPF, DKIM &amp; DMARC</h1>
  <p class="sub">How email authentication works — and what attackers look for when it breaks.</p>

  <div class="sect-tabs" id="sect-tabs"></div>

  <div class="step-meta">
    <span class="step-counter" id="step-counter">Step 1 / 1</span>
    <span class="step-title-lbl" id="step-title"></span>
    <div class="pips" id="pips"></div>
  </div>

  <div id="main-display"></div>
  <div class="narr" id="narr"></div>
  <div id="quiz-area"></div>

  <div class="nav-row">
    <button class="btn-nav" id="btn-prev">&#8592; Prev</button>
    <button class="btn-nav primary" id="btn-next">Next &#8594;</button>
  </div>
</div>

<script>
/* ── Quiz state ──────────────────────────────────────── */
var quizAnswered = {};

function renderQuiz(q, key) {
  if (!q) return '';
  var ans = quizAnswered[key];
  var html = '<div class="quiz-card"><div class="quiz-q">&#10067; ' + q.q + '</div><div class="quiz-opts">';
  q.opts.forEach(function(opt, i) {
    var cls = 'q-opt';
    if (ans !== undefined) {
      if (i === q.correct) cls += ' q-correct';
      else if (i === ans) cls += ' q-wrong';
      else cls += ' q-dim';
    }
    html += '<button class="' + cls + '"' + (ans !== undefined ? ' disabled' : '') +
      ' onclick="answerQuiz(\'' + key + '\',' + i + ')">' + opt + '</button>';
  });
  html += '</div>';
  if (ans !== undefined) html += '<div class="q-explain show">' + q.explain + '</div>';
  html += '</div>';
  return html;
}

function answerQuiz(key, i) {
  quizAnswered[key] = i;
  renderAll();
}

/* ── Helpers ─────────────────────────────────────────── */
function panel(lbl, inner) {
  return '<div class="panel"><div class="panel-lbl">' + lbl + '</div>' + inner + '</div>';
}
function tok(cls, key, val, desc) {
  return '<div class="tok-row tok-' + cls + '"><span class="tok-key">' + key +
    '</span><span class="tok-val">' + val + '</span><span class="tok-desc">' + desc + '</span></div>';
}
function atk(cls, lbl, body) {
  return '<div class="atk ' + cls + '"><div class="atk-lbl">' + lbl + '</div><div class="atk-body">' + body + '</div></div>';
}
function chk(cls, txt) { return '<div class="chk ' + cls + '">' + txt + '</div>'; }
function fnode(icon, label, boxCls, note) {
  return '<div class="flow-node">' +
    (icon ? '<div class="flow-icon">' + icon + '</div>' : '') +
    '<div class="flow-box' + (boxCls ? ' ' + boxCls : '') + '">' + label + '</div>' +
    (note ? '<div class="flow-lbl">' + note + '</div>' : '') +
    '</div>';
}
function farr(hl) { return '<div class="flow-arr' + (hl ? ' hl' : '') + '">&#8594;</div>'; }
function astep(n, html) {
  return '<div class="astep"><div class="anum">' + n + '</div><div>' + html + '</div></div>';
}
function tblWrap(inner) { return '<div class="tbl-wrap">' + inner + '</div>'; }
function matrixWrap(inner) { return '<div class="matrix-wrap">' + inner + '</div>'; }

/* ── Sections ────────────────────────────────────────── */
var SECTIONS = [

/* ═══════════════════════════════════════════
   0 · MX RECORDS
   ═══════════════════════════════════════════ */
{
  label: '1 · MX',
  steps: [
    {
      title: 'MX Records: how email finds its destination',
      display: function() {
        return panel('DNS MX lookup — "Which server receives mail for example.com?"',
          '<div class="flow" style="gap:.2rem;">' +
            fnode('&#128140;','alice<br>@company.com','hl','Sender') +
            farr(true) +
            fnode('&#127968;','company.com<br><small>SMTP / MTA</small>','') +
            farr() +
            '<div class="flow-node"><div style="font-size:.66rem;color:var(--muted);text-align:center;margin-bottom:.2rem;">DNS query:<br><code style="color:var(--accent);">MX example.com?</code></div>' +
              '<div class="flow-box warn">&#127760; DNS</div></div>' +
            farr() +
            fnode('&#127968;','mail.example.com<br><small>:25 SMTP</small>','hl2','Highest-priority<br>MX server') +
            farr(true) +
            fnode('&#128235;','bob<br>@example.com','hl','Inbox') +
          '</div>') +
        panel('DNS response — priority-ordered list (RFC 5321)',
          '<div class="tokens">' +
            tok('a','example.com.','MX 10  mail.example.com.','Preferred — lower number wins. Tried first.') +
            tok('r','example.com.','MX 10  mail2.example.com.','Same priority as above — RFC 5321 requires senders to <strong>randomise</strong> selection among equal-priority records for load balancing.') +
            tok('v','example.com.','MX 20  backup.example.com.','Fallback — only tried when all priority-10 hosts are unreachable.') +
          '</div>');
      },
      narr: 'When Alice\'s mail server needs to deliver to <strong>bob@example.com</strong> it queries DNS for MX (Mail eXchanger) records. DNS returns a list with numeric priorities — <strong>lower number = higher preference, tried first</strong>. If multiple records share the same priority, RFC 5321 requires senders to randomise selection among them — that\'s how equal-priority MX records provide both load balancing and redundancy. Different priority values provide failover only.',
      quiz: null
    },
    {
      title: 'MX routes mail — it does not authenticate the sender',
      display: function() {
        return panel('Any server on the internet can knock on your MX port',
          '<div class="flow" style="gap:.2rem;flex-wrap:wrap;">' +
            fnode('&#128373;','attacker<br>server','danger','Any IP') +
            farr() +
            '<div class="flow-node">' +
              '<div class="flow-box hl" style="text-align:left;white-space:normal;max-width:220px;padding:.5rem .75rem;">' +
                '<strong>mail.example.com:25</strong><br>' +
                '<small style="font-weight:400;">EHLO attacker.net<br>MAIL FROM: &lt;ceo@example.com&gt;<br>RCPT TO: &lt;bob@example.com&gt;<br>DATA…</small>' +
              '</div>' +
            '</div>' +
            farr() +
            fnode('&#128235;','Bob\'s inbox?','warn','Spoofed<br>delivered?') +
          '</div>') +
        '<div class="two-col">' +
          atk('bad','&#9888; The gap','MX tells senders where to connect. SMTP itself has no built-in sender verification. Any host can claim any <code>MAIL FROM</code> address — MX routing will accept the TCP connection regardless. This has been true since the 1970s.') +

      narr: 'RFC 7489 requires external report destinations to publish a consent record. <strong>This check only confirms the record exists — it cannot verify who registered the destination domain.</strong> An attacker who registers the typo\'d domain and publishes their own consent record satisfies the spec check automatically. The mechanism protects against accidentally flooding arbitrary email addresses; it provides no protection against deliberate registration of a lookalike domain. <em>Manual whois verification of every rua/ruf destination is the only reliable check.</em>',
      quiz: null
    }
  ]

/* ── Navigation ──────────────────────────────────────────── */
var curSect = 0;
var curStep = 0;

function renderAll() {
  var sect = SECTIONS[curSect];
  var step = sect.steps[curStep];
  var key  = curSect + '_' + curStep;

  document.getElementById('sect-tabs').innerHTML = SECTIONS.map(function(s, i) {
    var cls = 'sect-tab' + (i === curSect ? ' active' : '');
    return '<button class="' + cls + '" onclick="goSect(' + i + ')">' + s.label + '</button>';
  }).join('');

  document.getElementById('step-counter').textContent =
    'Step ' + (curStep + 1) + ' / ' + sect.steps.length;
  document.getElementById('step-title').textContent = step.title;

  document.getElementById('pips').innerHTML = sect.steps.map(function(_, i) {
    var cls = 'pip' + (i < curStep ? ' done' : '') + (i === curStep ? ' active' : '');
    return '<div class="' + cls + '" onclick="goStepDirect(' + i + ')"></div>';
  }).join('');

  document.getElementById('main-display').innerHTML = step.display();
  document.getElementById('narr').innerHTML = step.narr;
  document.getElementById('quiz-area').innerHTML = renderQuiz(step.quiz, key);

  document.getElementById('btn-prev').disabled = (curSect === 0 && curStep === 0);
  var isLast = (curSect === SECTIONS.length - 1 && curStep === sect.steps.length - 1);
  var btnNext = document.getElementById('btn-next');
  btnNext.innerHTML = isLast ? '&#10003; Done' : 'Next &#8594;';
  btnNext.disabled = false;

  window.scrollTo({top: 0, behavior: 'smooth'});
}

function goSect(i) { curSect = i; curStep = 0; renderAll(); }
function goStepDirect(i) { curStep = i; renderAll(); }

document.getElementById('btn-next').addEventListener('click', function() {
  var sect = SECTIONS[curSect];
  if (curStep < sect.steps.length - 1) {
    curStep++;
  } else if (curSect < SECTIONS.length - 1) {
    curSect++;
    curStep = 0;
  }
  renderAll();
});

document.getElementById('btn-prev').addEventListener('click', function() {
  if (curStep > 0) {
    curStep--;
  } else if (curSect > 0) {
    curSect--;
    curStep = SECTIONS[curSect].steps.length - 1;
  }
  renderAll();
});

renderAll();
</script>
